<!doctype html >
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <!--========= Required meta tags =========-->
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>InvestMate Ваш партнер в создании капитала</title>

    <link rel="shortcut icon" th:href="@{/img/logo/logow.jpg}" type="images/x-icon"/>
    <link rel="stylesheet" th:href="@{https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap&subset=cyrillic}" >
    <!-- css include -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/fontawesome.css}">
    <link rel="stylesheet" th:href="@{/css/animate.css}">
    <link rel="stylesheet" th:href="@{/css/swiper.min.css}">
    <link rel="stylesheet" th:href="@{/css/odometer.css}">
    <link rel="stylesheet" th:href="@{/css/imageRevealHover.css}">
    <link rel="stylesheet" th:href="@{/css/jquery-ui.min.css}">
    <link rel="stylesheet" th:href="@{/css/magnific-popup.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

<!-- backtotop - start -->
<div class="xb-backtotop">
    <a th:href="@{/index.html#}" class="scroll">
        <i class="far fa-arrow-up"></i>
    </a>
</div>
<!-- backtotop - end -->

<!-- preloader start -->
<div id="xb-loadding" class="xb-loader"><div class="loading-spin"></div></div>
<!-- preloader end -->



<div class="body_wrap">
    <!-- header start -->
    <div th:if="${showHeader == true}">
        <header th:replace="~{layout/header :: header}"></header>
    </div>
    <!-- header end -->
    <!-- overlay menu start -->
    <div th:if="${showHeader == true}">
        <div th:replace="~{layout/overlaymenu :: overlaymenu}"></div>
    </div>
    <!-- overlay menu end -->

    <!-- main area start  -->
    <div th:if="${showHome == true}">
        <main th:replace="~{layout/home :: main}"></main>
    </div>
    <div th:if="${showContact == true}">
        <main th:replace="~{layout/contact :: main}"></main>
    </div>
    <div th:if="${showCatalog == true}">
        <main th:replace="~{layout/catalog :: main}"></main>
    </div>
    <div th:if="${showCatalogSingle == true}">
        <main th:replace="~{layout/catalog-single :: main}"></main>
    </div>
    <!-- main area end  -->
    
   <!-- footer strt -->
    <div th:if="${showFooter == true}">
        <footer th:replace="~{layout/footer :: footer}"></footer>
    </div>
    <!-- footer end -->
</div>

<span id="token" th:value="${token}" hidden></span>
<span id="role" th:value="${role}" hidden></span>

<!-- jquery include -->
<script th:src="@{/js/jquery-3.7.1.min.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/swiper.min.js}"></script>
<script th:src="@{/js/wow.min.js}"></script>
<script th:src="@{/js/gsap.min.js}"></script>
<script th:src="@{/js/ScrollSmoother.min.js}"></script>
<script th:src="@{/js/ScrollTrigger.min.js}"></script>
<script th:src="@{/js/SplitText.min.js}"></script>
<script th:src="@{/js/appear.js}"></script>
<script th:src="@{/js/odometer.min.js}"></script>
<script th:src="@{/js/imagesloaded.pkgd.min.js}"></script>
<script th:src="@{/js/jquery.marquee.min.js}"></script>
<script th:src="@{/js/isotope.pkgd.min.js}"></script>
<script th:src="@{/js/jquery.magnific-popup.min.js}"></script>
<script th:src="@{/js/touchspin.js}"></script>
<script th:src="@{/js/jquery-ui.min.js}"></script>
<script th:src="@{/js/imageRevealHover.js}"></script>
<script th:src="@{/js/TweenMax.min.js}"></script>
<script th:src="@{/js/easing.min.js}"></script>
<script th:src="@{/js/scrollspy.js}"></script>
<script th:src="@{/js/ukiyo.min.js}"></script>
<script th:src="@{/js/lenis.js}"></script>
<script th:src="@{/js/matter.js}"></script>
<script th:src="@{/js/throwable.js}"></script>
<script th:src="@{/js/catalog.js}"></script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/token.js}"></script>
<script th:src="@{/js/sign.js}"></script>

</body>

</html>
