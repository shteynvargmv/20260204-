<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:https="http://www.w3.org/1999/xhtml">

<body>

<!-- backtotop - start -->

<!-- backtotop - end -->

<!-- preloader start -->

<!-- preloader end -->

<!-- header start -->

<!-- header end -->

<!-- overlay menu start -->

<!-- overlay menu end -->

<!-- main area start  -->
<main th:fragment="main">
    <div class="body_wrap">
        <!-- breadcrumb start  -->
        <section class="breadcrumb pt-10 pb-40">
            <div class="container">
                <div class="breadcrumb__content text-center">
                    <h2 class="breadcrumb__title" th:text="${instrument.getTypeString()}"></h2>
                    <ul class="breadcrumb__list">
                        <li class="breadcrumb-item"><a th:href="@{/invest/home}">Главная</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/invest/catalog/all}">Каталог</a></li>
                    </ul>
                </div>
            </div>
        </section>
        <!-- breadcrumb end  -->

        <!-- shop single start -->
        <section class="shop-single-section pt-30 pb-90">
            <div class="container">
                <div class="row">
                    <div class="col-md-6">
                        <div class="product-single-wrap mb-30">
                            <div class="product_details_img ">
                                <div class="tab-content" id="myTabContent">
                                    <div class="tab-pane show active" id="home" role="tabpanel"
                                         aria-labelledby="home-tab">
                                        <div class="pl_thumb">
                                            <a th:if="${instrument.getBrand() != null}"
                                               th:href="@{/invest/catalog-single/{uid}(uid=${instrument.uid})}">
                                                <img th:src="@{'//invest-brands.cdn-tinkoff.ru/' +
                                                         ${instrument.getBrand().getLogo()} + 'x640' + ${instrument.getBrand().getLogoExt()}}"
                                                     alt=""
                                                     onerror="this.onerror=null; this.src='/img/catalog/noLogo.jpg';">
                                            </a>
                                        </div>
                                    </div></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 product-details-col">
                        <div class="product-details mb-30">
                            <h7 th:text="${instrument.getUpdateDateLocalString()}" id="update-date"></h7>
                            <h2 th:text="${instrument.getUid()}" hidden id="uid"></h2>
                            <h2 th:text="${instrument.getName()}" id="name" th:style="'color: var(--color-primary);'"></h2>
                            <h6 th:text="${instrument.getNameLong()}" id="name-long"></h6>
                            <h4 class="mt-30" >Тикер:</h4>
                            <h4 th:text="${instrument.getTicker()}" id="ticker"></h4>
                            <h4 th:if="${instrument.getCurrency() == null}" class="mt-10">Страна эмитента:</h4>
                            <h4><a th:text="${instrument.getCountryOfRiskName()}" id="country-of-risk-name"></a>
                            </h4>
                            <h4><img th:src="@{'//invest-brands.cdn-tinkoff.ru/countries/flags/' +
                                                         ${instrument.getCountryOfRisk()} + '.png'}"
                                     alt="" width="25" style="border-radius: 50%"
                                     onerror="this.onerror=null; this.src='/img/catalog/noLogo.jpg';">
                            </h4>

                            <h5 class="price mt-30 pt-20">
                                <span class="current" th:text="'Цена: '+${instrument.getPriceString()}"
                                      id="price"></span>
                            </h5>
                            <h5 class="price">
                                <span class="current" th:text="'Валюта: '+${instrument.getSymbol().getNamePlural()}"></span>
                            </h5>
                            <h5 class="price">
                                <span class="current" th:text="'Лотность: '+${instrument.getLot()}+' шт'"
                                      id="lot"></span>
                            </h5>
                            <div class="mt-20">
                                <span class="current" th:text="${instrument.getDescription()}"
                                      id="description"></span>
                            </div>

                            <div class="product-option">
                                <form class="form">
                                    <div class="product-row">
                                        <div class="add-to-cart-btn d-flex gap-3">
                                            <button onclick="favorite(this); return false;" class="xb-btn ms-0"
                                                    style="flex: 1; min-width: 300px; padding: 14px 20px; white-space: nowrap;"
                                                    th:id="'favorite-uid'+${instrument.uid}">
                                                <i class="far fa-shopping-bag me-2"></i>
                                                <a id="favorite-text"
                                                   th:text="${instrument.favorites} == null ? 'В избранное' : 'Убрать из избранного' "></a>
                                            </button>
                                            <button onclick="refresh(this); return false;" class="xb-btn"
                                                    style="flex: 1; min-width: 300px; padding: 14px 20px; white-space: nowrap;">
                                                <i class="bi bi-arrow-repeat me-2"></i>Обновить
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>

                            <div class="thb-product-meta-after mt-20">
                                <div class="product_meta">
                                </div>
                            </div>


                        </div>
                    </div> <!-- end col -->
                </div> <!-- end row -->

                <div class="row">
                    <div class="col col-xs-12">
                        <div class="single-product-info">
                            <!-- Tab panes -->
                            <div class="tab-content" id="pills-tabContent">
                                <div class="tab-pane fade show active" id="tb-01">
                                </div>
                                <div class="tab-pane fade" id="tb-02">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div> <!-- end row -->

            <!-- end of container -->
        </section>
        <!-- shop single start -->
    </div>
</main>
<!-- main area end  -->

<!-- footer start -->
<!-- footer start -->

<!-- jquery include -->

</body>

</html>
