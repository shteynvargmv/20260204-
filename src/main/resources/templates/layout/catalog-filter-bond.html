<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<li th:if="${type == 'bond' || type == 'all'}"
    th:each="parameter, parameterStat : ${bondParameters}"
    th:fragment="filter"
    class="d-flex justify-content-between align-items-center">
    <span th:text="${parameter.value}"></span>
    <input type="checkbox"
           th:id="'parameter_bond_' + ${parameterStat.index}"
           th:data-type="${type}"
           th:value="${parameter.key}"
           onclick="setFilter(this)"
           th:checked="${selectedBondParameters != null and selectedBondParameters.contains(parameter.key)}"
           class="form-check-input">
</li>
</body>
</html>
